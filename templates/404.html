<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI'; padding: 20px; }
        .error-container { text-align: center; background: white; border-radius: 20px; padding: 60px 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 100%; }
        .error-icon { font-size: 4rem; color: #667eea; margin-bottom: 20px; }
        .error-code { font-size: 3rem; font-weight: 700; color: #2d3748; margin-bottom: 10px; }
        .error-title { font-size: 1.5rem; color: #2d3748; font-weight: 600; margin-bottom: 15px; }
        .error-message { color: #718096; margin-bottom: 30px; }
        .error-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: #e2e8f0; color: #2d3748; }
        .btn-secondary:hover { background: #cbd5e0; }
        @media (max-width: 480px) { .error-container { padding: 40px 20px; } .error-code { font-size: 2.5rem; } }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon"><i class="fas fa-search-minus"></i></div>
        <div class="error-code">404</div>
        <div class="error-title">Page Not Found</div>
        <p class="error-message">
            Oops! The page you're looking for doesn't exist.
        </p>
        <div class="error-actions">
            <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
            <a href="javascript:history.back()" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Go Back</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
